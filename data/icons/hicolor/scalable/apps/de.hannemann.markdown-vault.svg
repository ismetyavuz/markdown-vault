<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2E5A88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6BB5FF"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Document shape -->
  <rect x="32" y="20" width="64" height="88" rx="4" fill="white" opacity="0.95"/>
  <path d="M76 20 L92 36 L92 100 L32 100 L32 20 Z" fill="white" opacity="0.95"/>
  
  <!-- Fold -->
  <path d="M76 20 L76 36 L92 36" fill="url(#accent)" opacity="0.3"/>
  
  <!-- Markdown hash symbol -->
  <text x="64" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#2E5A88" text-anchor="middle">#</text>
  
  <!-- Vault brackets decoration -->
  <text x="48" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#6BB5FF" text-anchor="middle">[[]]</text>
</svg>
