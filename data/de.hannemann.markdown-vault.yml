app-id: de.hannemann.markdown-vault
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: markdown-vault

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --talk-name=org.freedesktop.portal.FileChooser

modules:
  - name: python3-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --no-build-isolation --prefix=${FLATPAK_DEST} --ignore-installed --no-deps /run/build/python3-dependencies/pyyaml-6.0.3-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl /run/build/python3-dependencies/pymdown_extensions-11.0.1-py3-none-any.whl /run/build/python3-dependencies/pygments-2.20.0-py3-none-any.whl
    sources:
      - type: file
        path: pyyaml-6.0.3-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl
        sha256: 0f29edc409a6392443abf94b9cf89ce99889a1dd5376d94316ae5145dfedd5d6
      - type: file
        path: pymdown_extensions-11.0.1-py3-none-any.whl
        sha256: db3943a62bab7e03af1364f0c4083e64b91fb097675a4b6cceccfbe9a77e5eb2
      - type: file
        path: pygments-2.20.0-py3-none-any.whl
        sha256: 81a9e26dd42fd28a23a2d169d86d7ac03b46e2f8b59ed4698fb4785f946d0176

  - name: markdown-vault
    buildsystem: meson
    sources:
      - type: dir
        path: ..
